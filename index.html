<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>عرض الختم - الواقع المعزز الشامل</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/webxr/ARButton.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #111; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; }
        
        /* تصميم الزر الخاص بالآيفون */
        #ios-ar-btn {
            display: none; /* يكون مخفياً ويظهر للآيفون فقط */
            padding: 15px 35px; font-size: 18px; font-weight: bold;
            background: #ffffff; color: #000000; border: none; border-radius: 30px;
            cursor: pointer; text-decoration: none; text-align: center;
            box-shadow: 0 5px 15px rgba(255,255,255,0.2);
        }
        
        #loading-msg { color: white; font-size: 18px; }
    </style>
</head>
<body>

    <a id="ios-ar-btn" rel="ar" href="cylinder_seal.usdz">
        📱 اضغط هنا لوضع الختم على الأرض
    </a>
    
    <div id="loading-msg">جاري تجهيز بيئة الواقع المعزز...</div>

    <script>
        // 1. نظام الفحص الذكي لمعرفة نوع الجهاز
        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        const msg = document.getElementById('loading-msg');

        if (isIOS) {
            // إذا كان الجهاز آيفون
            msg.style.display = 'none';
            document.getElementById('ios-ar-btn').style.display = 'block';
        } else {
            // إذا كان الجهاز أندرويد
            msg.style.display = 'none';
            initAndroidAR(); // تشغيل دالة الأندرويد
        }

        // 2. كود الأندرويد (تتبع الأرضية عبر WebXR)
        function initAndroidAR() {
            let container = document.createElement( 'div' );
            document.body.appendChild( container );

            let scene = new THREE.Scene();
            let camera = new THREE.PerspectiveCamera( 70, window.innerWidth / window.innerHeight, 0.01, 20 );

            let light = new THREE.HemisphereLight( 0xffffff, 0xbbbbff, 1 );
            light.position.set( 0.5, 1, 0.25 );
            scene.add( light );

            let renderer = new THREE.WebGLRenderer( { antialias: true, alpha: true } );
            renderer.setPixelRatio( window.devicePixelRatio );
            renderer.setSize( window.innerWidth, window.innerHeight );
            renderer.xr.enabled = true;
            container.appendChild( renderer.domElement );

            document.body.appendChild( ARButton.createButton( renderer, { requiredFeatures: [ 'hit-test' ] } ) );

            let reticle = new THREE.Mesh(
                new THREE.RingGeometry( 0.15, 0.2, 32 ).rotateX( - Math.PI / 2 ),
                new THREE.MeshBasicMaterial( { color: 0x00ff00 } )
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add( reticle );

            let modelPrefab = null;
            const loader = new THREE.GLTFLoader();
            loader.load( './cylinder_seal.glb', function ( gltf ) {
                modelPrefab = gltf.scene;
                modelPrefab.scale.set( 0.05, 0.05, 0.05 ); 
            });

            let controller = renderer.xr.getController( 0 );
            controller.addEventListener( 'select', function() {
                if ( reticle.visible && modelPrefab ) {
                    const mesh = modelPrefab.clone();
                    mesh.position.setFromMatrixPosition( reticle.matrix );
                    scene.add( mesh );
                }
            });
            scene.add( controller );

            let hitTestSource = null;
            let hitTestSourceRequested = false;

            renderer.setAnimationLoop( function( timestamp, frame ) {
                if ( frame ) {
                    const referenceSpace = renderer.xr.getReferenceSpace();
                    const session = renderer.xr.getSession();

                    if ( hitTestSourceRequested === false ) {
                        session.requestReferenceSpace( 'viewer' ).then( function ( referenceSpace ) {
                            session.requestHitTestSource( { space: referenceSpace } ).then( function ( source ) {
                                hitTestSource = source;
                            } );
                        } );
                        session.addEventListener( 'end', function () {
                            hitTestSourceRequested = false;
                            hitTestSource = null;
                        } );
                        hitTestSourceRequested = true;
                    }

                    if ( hitTestSource ) {
                        const hitTestResults = frame.getHitTestResults( hitTestSource );
                        if ( hitTestResults.length > 0 ) {
                            const hit = hitTestResults[ 0 ];
                            reticle.visible = true;
                            reticle.matrix.fromArray( hit.getPose( referenceSpace ).transform.matrix );
                        } else {
                            reticle.visible = false;
                        }
                    }
                }
                renderer.render( scene, camera );
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معاينة الختم الأسطواني - AR</title>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #1a1a1a; font-family: sans-serif; }

        /* شاشة التحميل - تمنع استخدام الموقع حتى يكتمل التحميل */
        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #111; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            color: white; transition: opacity 0.5s ease;
        }

        .spinner {
            width: 50px; height: 50px; border: 5px solid #333;
            border-top: 5px solid #e67e22; border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 20px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* حاوية العرض AR */
        model-viewer {
            width: 100%; height: 100vh;
            --poster-color: transparent;
        }

        /* زر تفعيل الواقع المعزز */
        #ar-button {
            background-color: #e67e22; border-radius: 30px; border: none;
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            padding: 15px 35px; color: white; font-weight: bold; font-size: 18px;
            cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: none; /* يظهر فقط بعد التحميل */
        }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div class="spinner"></div>
        <p id="loading-text">جاري تحميل الختم الأسطواني... 0%</p>
    </div>

    <model-viewer 
        id="artifact-model"
        src="cylinder_seal.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        touch-action="pan-y"
        shadow-intensity="1" 
        exposure="1.2"
        auto-rotate
        alt="A 3D model of a cylinder seal">
        
        <button slot="ar-button" id="ar-button">
            اضغط هنا لوضع الختم على الأرض
        </button>

    </model-viewer>

    <script>
        const modelViewer = document.querySelector('#artifact-model');
        const overlay = document.querySelector('#loading-overlay');
        const loadingText = document.querySelector('#loading-text');
        const arButton = document.querySelector('#ar-button');

        // تحديث نسبة التحميل
        modelViewer.addEventListener('progress', (event) => {
            const percent = Math.round(event.detail.totalProgress * 100);
            loadingText.innerText = `جاري تحميل الختم الأسطواني... ${percent}%`;
            
            if (percent >= 100) {
                loadingText.innerText = "اكتمل التحميل! جاري التجهيز...";
            }
        });

        // إخفاء شاشة التحميل بمجرد أن يصبح المجسم جاهزاً تماماً
        modelViewer.addEventListener('load', () => {
            setTimeout(() => {
                overlay.style.opacity = '0';
                setTimeout(() => {
                    overlay.style.display = 'none';
                    arButton.style.display = 'block';
                }, 500);
            }, 1000);
        });

        // التعامل مع أخطاء التحميل
        modelViewer.addEventListener('error', (error) => {
            loadingText.innerText = "فشل تحميل الملف. تأكد من وجود cylinder_seal.glb في المجلد.";
            console.error(error);
        });
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>عرض الختم - تتبع الأرضية AR</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/webxr/ARButton.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #111; font-family: sans-serif; }
    </style>
</head>
<body>

    <script>
        let container;
        let camera, scene, renderer;
        let controller;
        let reticle; // المؤشر الذي سيبحث عن الأرضية
        let hitTestSource = null;
        let hitTestSourceRequested = false;
        let modelPrefab = null; // الختم الأسطواني

        init();
        animate();

        function init() {
            container = document.createElement( 'div' );
            document.body.appendChild( container );

            // إعداد المشهد
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera( 70, window.innerWidth / window.innerHeight, 0.01, 20 );

            // إضاءة ممتازة للقطعة
            const light = new THREE.HemisphereLight( 0xffffff, 0xbbbbff, 1 );
            light.position.set( 0.5, 1, 0.25 );
            scene.add( light );
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
            dirLight.position.set(0, 5, 0);
            scene.add(dirLight);

            // إعداد محرك الرندر وتفعيل نظام الواقع المعزز (AR)
            renderer = new THREE.WebGLRenderer( { antialias: true, alpha: true } );
            renderer.setPixelRatio( window.devicePixelRatio );
            renderer.setSize( window.innerWidth, window.innerHeight );
            renderer.xr.enabled = true; // تفعيل الكاميرا والـ AR
            container.appendChild( renderer.domElement );

            // إضافة زر (START AR) بمنتصف الشاشة من الأسفل
            document.body.appendChild( ARButton.createButton( renderer, { requiredFeatures: [ 'hit-test' ] } ) );

            // تحميل ملف الختم الأسطواني
            const loader = new THREE.GLTFLoader();
            loader.load( './cylinder_seal.glb', function ( gltf ) {
                modelPrefab = gltf.scene;
                // ضبط الحجم: عدل الرقم هنا إذا ظهرت القطعة كبيرة جداً أو صغيرة
                modelPrefab.scale.set( 0.05, 0.05, 0.05 ); 
            });

            // عند الضغط على الشاشة (وضع القطعة على الأرض)
            function onSelect() {
                if ( reticle.visible && modelPrefab ) {
                    const mesh = modelPrefab.clone();
                    // تثبيت القطعة في نفس إحداثيات المؤشر الأخضر الذي وجد الأرض
                    mesh.position.setFromMatrixPosition( reticle.matrix );
                    scene.add( mesh );
                }
            }

            controller = renderer.xr.getController( 0 );
            controller.addEventListener( 'select', onSelect );
            scene.add( controller );

            // تصميم المؤشر الذي سيظهر على الأرض (حلقة خضراء)
            reticle = new THREE.Mesh(
                new THREE.RingGeometry( 0.15, 0.2, 32 ).rotateX( - Math.PI / 2 ),
                new THREE.MeshBasicMaterial( { color: 0x00ff00 } )
            );
            reticle.matrixAutoUpdate = false;
            reticle.visible = false;
            scene.add( reticle );

            window.addEventListener( 'resize', onWindowResize );
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize( window.innerWidth, window.innerHeight );
        }

        function animate() {
            renderer.setAnimationLoop( render );
        }

        // حلقة التحديث المستمرة (لقراءة الأرضيات باستمرار من الكاميرا)
        function render( timestamp, frame ) {
            if ( frame ) {
                const referenceSpace = renderer.xr.getReferenceSpace();
                const session = renderer.xr.getSession();

                if ( hitTestSourceRequested === false ) {
                    session.requestReferenceSpace( 'viewer' ).then( function ( referenceSpace ) {
                        session.requestHitTestSource( { space: referenceSpace } ).then( function ( source ) {
                            hitTestSource = source;
                        } );
                    } );
                    session.addEventListener( 'end', function () {
                        hitTestSourceRequested = false;
                        hitTestSource = null;
                    } );
                    hitTestSourceRequested = true;
                }

                if ( hitTestSource ) {
                    const hitTestResults = frame.getHitTestResults( hitTestSource );
                    // إذا تعرفت الكاميرا على الأرض، أظهر المؤشر الأخضر
                    if ( hitTestResults.length > 0 ) {
                        const hit = hitTestResults[ 0 ];
                        reticle.visible = true;
                        reticle.matrix.fromArray( hit.getPose( referenceSpace ).transform.matrix );
                    } else {
                        reticle.visible = false;
                    }
                }
            }
            renderer.render( scene, camera );
        }
    </script>
</body>
</html>

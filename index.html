<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عرض الختم الأسطواني - AR</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #video-background {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover; z-index: 1; transform: scaleX(-1);
        }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 2; }
        
        #ui-overlay {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 10; text-align: center;
        }
        
        #start-btn {
            padding: 16px 40px; font-size: 20px; font-weight: bold;
            background: #e67e22; color: white; border: none; border-radius: 50px;
            cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            transition: 0.3s;
        }
        #start-btn:hover { background: #d35400; transform: scale(1.05); }
        
        #status {
            color: white; margin-top: 15px; font-size: 14px;
            background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px;
            display: none;
        }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <button id="start-btn">بدء تجربة الختم الأسطواني</button>
        <div id="status">جاري تحميل نظام التتبع...</div>
    </div>
    
    <video id="video-background" autoplay playsinline></video>
    <div id="canvas-container"></div>

    <script>
        // 1. إعداد Three.js
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 8;

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // إضاءة قوية لتناسب تفاصيل القطع الأثرية
        const ambientLight = new THREE.AmbientLight(0xffffff, 1);
        scene.add(ambientLight);
        const pointLight = new THREE.PointLight(0xffffff, 1.5);
        pointLight.position.set(5, 5, 5);
        scene.add(pointLight);

        // 2. تحميل المجسم (الختم الأسطواني)
        let trackedObject = new THREE.Group();
        scene.add(trackedObject);

        const loader = new THREE.GLTFLoader();
        // سيقوم هذا الكود بالبحث عن الملف في نفس المجلد
        loader.load('./cylinder_seal.glb', function (gltf) {
            const model = gltf.scene;
            
            // ضبط الحجم: الختم الأسطواني غالباً ما يكون صغيراً، ضبط الرقم حسب ملفك
            model.scale.set(0.5, 0.5, 0.5); 
            
            // تدوير افتراضي ليظهر بشكل عرضي أو طولي حسب رغبتك
            model.rotation.x = Math.PI / 2; 

            trackedObject.add(model);
            trackedObject.visible = false;
            console.log("Model Loaded Successfully");
        }, undefined, function (e) { console.error("Error loading model", e); });

        // 3. منطق التتبع عبر MediaPipe
        const videoElement = document.getElementById('video-background');
        
        function onResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                trackedObject.visible = true;
                const landmarks = results.multiHandLandmarks[0];
                
                // النقطة 9 (منتصف الكف)
                const palmCenter = landmarks[9]; 

                // تحويل الإحداثيات لتتطابق مع حركة اليد أمام الكاميرا
                const x = -(palmCenter.x - 0.5) * 12; 
                const y = -(palmCenter.y - 0.5) * 8; 
                
                trackedObject.position.set(x, y, 0);

                // حركة دوران خفيفة لإظهار نقوش الختم
                trackedObject.rotation.y += 0.01;
            } else {
                trackedObject.visible = false;
            }
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
        hands.onResults(onResults);

        // 4. تشغيل الكاميرا "غصباً" عند الضغط
        document.getElementById('start-btn').addEventListener('click', async () => {
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('status').style.display = 'block';

            const cameraUtils = new Camera(videoElement, {
                onFrame: async () => { await hands.send({image: videoElement}); },
                width: 1280, height: 720
            });
            
            cameraUtils.start().then(() => {
                document.getElementById('status').style.display = 'none';
            });
        });

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
